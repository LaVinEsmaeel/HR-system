<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile | Employee Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f2f2f2;
  color: #222;
}

.top-header {
  background: #0e244c;
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  color: #fff;
  font-size: 14px;
}

.wrapper {
  padding: 25px;
}

.page-title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 19px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon-btn {
  background: none;
  border: none;
  color: #0e2859;
  font-size: 20px;
  cursor: pointer;
  transition: color 0.2s ease;
}

.icon-btn:hover {
  color: #153d8a;
}

.profile-card {
  background: #fff;
  border: 1px solid #ddd;
  padding: 20px;
  max-width: 700px;
}

.profile-top {
  display: flex;
  border-bottom: 1px solid #ccc;
  padding-bottom: 15px;
  margin-bottom: 15px;
  align-items: center;
}

.profile-photo img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #ccc;
  margin-right: 20px;
}

.profile-name {
  font-size: 18px;
  font-weight: bold;
}

.profile-role {
  font-size: 13px;
  color: #555;
  margin-top: 4px;
}

.profile-details {
  font-size: 14px;
}

.profile-details div {
  margin-bottom: 10px;
}

.label {
  font-weight: bold;
  display: inline-block;
  width: 150px;
}
</style>
</head>

<body>

<div class="top-header">
  Qaiwan International University
</div>

<div class="wrapper">
  <div class="page-title">
    <button class="icon-btn" onclick="window.location.href='Employe Dashboard.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    My Profile
  </div>

  <div class="profile-card">

    <div class="profile-top">
      <div class="profile-photo">
        <img src="employe.jpg" alt="Employee Photo">
      </div>
      <div>
        <div class="profile-name">Employee Name</div>
        <div class="profile-role">HR Department</div>
      </div>
    </div>

    <div class="profile-details">
      <div><span class="label">Employee ID:</span> QIU-EMP-001</div>
      <div><span class="label">Department:</span> Human Resources</div>
      <div><span class="label">Position:</span> HR Officer</div>
      <div><span class="label">Email:</span> employee@qiu.edu.iq</div>
      <div><span class="label">Phone:</span> +964 750 000 0000</div>
      <div><span class="label">Hire Date:</span> 01-09-2023</div>
    </div>

  </div>
</div>

</body>
</html>
