<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Summary | Employee Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {margin:0;font-family:Arial,Helvetica,sans-serif;background:#f2f2f2;color:#222;}
.top-header{background:#0e244c;height:46px;display:flex;align-items:center;padding:0 20px;color:#fff;font-size:14px;}
.wrapper{padding:25px;}
.page-title{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:bold;margin-bottom:19px;}
.icon-btn{background:none;border:none;color:#0e2859;font-size:20px;cursor:pointer;transition:color 0.2s ease;}
.icon-btn:hover{color:#153d8a;}
.content-card{background:#fff;border:1px solid #ddd;padding:20px;max-width:750px;}
h3{margin-top:0;color:#0e2859;}
.profile-details{font-size:14px;}
.profile-details div{margin-bottom:10px;}
.label{font-weight:bold;display:inline-block;width:160px;}
</style>
</head>
<body>
<div class="top-header">Qaiwan International University</div>
<div class="wrapper">
  <div class="page-title">
    <button class="icon-btn" onclick="window.location.href='Employe Dashboard.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    Job Summary
  </div>
  <div class="content-card">
    <h3>Position Overview</h3>
    <div class="profile-details">
      <div><span class="label">Position Title:</span> HR Officer</div>
      <div><span class="label">Department:</span> Human Resources</div>
      <div><span class="label">Supervisor:</span> HR Director</div>
      <div><span class="label">Employment Type:</span> Full-Time</div>
      <div><span class="label">Hire Date:</span> 01-09-2023</div>
      <div><span class="label">Location:</span> Sulaimani Campus</div>
    </div>
  </div>
</div>
</body>
</html>
