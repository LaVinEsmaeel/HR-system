<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pay Information | Employee Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f2f2f2;
  color: #222;
}

.top-header {
  background: #0e244c;
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  color: #fff;
  font-size: 14px;
}

.wrapper {
  padding: 25px;
}

.page-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 19px;
}

.icon-btn {
  background: none;
  border: none;
  color: #0e2859;
  font-size: 20px;
  cursor: pointer;
  transition: color 0.2s ease;
}

.icon-btn:hover {
  color: #153d8a;
}

.content-card {
  background: #fff;
  border: 1px solid #ddd;
  padding: 20px;
  max-width: 750px;
}

h3 {
  margin-top: 0;
  color: #0e2859;
}

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

.table th, .table td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}

.table th {
  background: #f7f7f7;
  text-align: left;
}

.section {
  margin-bottom: 25px;
}

.links a {
  display: inline-block;
  margin-right: 15px;
  font-size: 14px;
  color: #0b5ed7;
  text-decoration: none;
}

.links a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>
<div class="top-header">Qaiwan International University</div>

<div class="wrapper">
  <div class="page-title">
    <button class="icon-btn" onclick="window.location.href='Employe Dashboard.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    Pay Information
  </div>

  <div class="content-card">

    <div class="section">
      <h3>Latest Pay Stub</h3>
      <table class="table">
        <tr><th>Date</th><td>07/08/2026</td></tr>
        <tr><th>Base Salary</th><td>$1,200.00</td></tr>
        <tr><th>Bonuses</th><td>$150.00</td></tr>
        <tr><th>Gross Pay</th><td>$1,350.00</td></tr>
        <tr><th>Deductions</th><td>$100.00</td></tr>
        <tr><th>Net Pay</th><td><strong>$1,250.00</strong></td></tr>
        <tr><th>Payment Method</th><td>Direct Deposit</td></tr>
        <tr><th>Bank Account</th><td>**** **** **** 4567</td></tr>
      </table>
    </div>

    <div class="section">
      <h3>Pay Options</h3>
      <div class="links">
        <a href="pay stub.html">All Pay Stubs</a>
        <a href="direct deposit.html">Direct Deposit</a>
        <a href="deductions.html">Deductions</a>
      </div>
    </div>

  </div>
</div>
</body>
</html>
