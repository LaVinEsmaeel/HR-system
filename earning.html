<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earnings | Employee Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f2f2f2;
  color: #222;
}
.top-header {
  background: #0e244c;
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  color: #fff;
  font-size: 14px;
}
.wrapper {
  padding: 25px;
}
.page-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 19px;
}
.icon-btn {
  background: none;
  border: none;
  color: #0e2859;
  font-size: 20px;
  cursor: pointer;
  transition: color 0.2s ease;
}
.icon-btn:hover {
  color: #153d8a;
}
.content-card {
  background: #fff;
  border: 1px solid #ddd;
  padding: 20px;
  max-width: 750px;
}
h3 {
  margin-top: 0;
  color: #0e2859;
}
.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
.table th, .table td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
}
.table th {
  background: #f7f7f7;
  text-align: left;
}
</style>
</head>
<body>
<div class="top-header">
  Qaiwan International University
</div>

<div class="wrapper">
  <div class="page-title">
    <button class="icon-btn" onclick="window.location.href='Employe Dashboard.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    Earnings
  </div>

  <div class="content-card">
    <h3>Monthly Earnings Summary</h3>
    <table class="table">
      <tr><th>Month</th><th>Base Salary</th><th>Bonuses</th><th>Total</th></tr>
      <tr><td>May 2026</td><td>$1,200</td><td>$150</td><td>$1,350</td></tr>
      <tr><td>June 2026</td><td>$1,200</td><td>$100</td><td>$1,300</td></tr>
      <tr><td>July 2026</td><td>$1,200</td><td>$120</td><td>$1,320</td></tr>
    </table>
  </div>
</div>
</body>
</html>
