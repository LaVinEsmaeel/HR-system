<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings | QIU</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== Reset & Base (SAME AS DASHBOARD) ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Inter, sans-serif;
}

body {
  background: #f4f6f9;
  display: flex;
  min-height: 100vh;
  color: #1f2937;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 260px;
  background: #ffffff;
  border-right: 1px solid #e5e7eb;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.logo {
  font-weight: 700;
  font-size: 14px;
  color: #0e244c;
  margin-bottom: 30px;
  line-height: 1.4;
  text-align: center;
}

.profile-box {
  background: #eef4ff;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 30px;
}

.profile-box img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  margin-bottom: 10px;
}

.profile-box h4 {
  font-size: 15px;
  font-weight: 600;
  color: #0e244c;
}

.profile-box span {
  font-size: 12px;
  color: #475569;
}

.menu {
  flex: 1;
}

.menu li {
  list-style: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: #334155;
  margin-bottom: 6px;
}

.menu li a {
  display: flex;
  align-items: center;
  gap: 12px;
  color: inherit;
  text-decoration: none;
}

.menu li.active,
.menu li:hover {
  background: #eef0ff;
  color: #0e244c;
}

.menu li.logout {
  margin-top: auto;
  border-top: 1px solid #e5e7eb;
  padding-top: 12px;
  color: #dc2626;
}

/* ===== Main ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ===== Topbar ===== */
.topbar {
  background: #0e244c;
  padding: 15px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar h1 {
  color: white;
  font-size: 20px;
  font-weight: 600;
}

/* ===== Content ===== */
.content {
  padding: 30px;
}

.header h2 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 25px;
}

/* ===== Settings Cards ===== */
.settings-card {
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  margin-bottom: 25px;
  max-width: 700px;
}

.settings-card h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 20px;
  color: #0e244c;
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 14px;
  margin-bottom: 6px;
  font-weight: 500;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  font-size: 14px;
}

input[readonly] {
  background: #f3f4f6;
}

button {
  background: #0e244c;
  color: white;
  border: none;
  padding: 10px 22px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

button:hover {
  background: #1e3a8a;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">QAIWAN INTERNATIONAL<br>UNIVERSITY</div>

  <div class="profile-box">
    <img src="manager.png">
    <h4>HR Manager</h4>
    <span>Human Resources</span>
  </div>

  <ul class="menu">
    <li><a href="HR Dashboard.html"><i class="fa-solid fa-chart-pie"></i> HR Dashboard</a></li>
    <li><a href="Employe Dashboard.html"><i class="fa-solid fa-users"></i> Employees</a></li>
    <li><a href="Departments.html"><i class="fa-solid fa-building"></i> Departments</a></li>
    <li><a href="Leave Request Page.html"><i class="fa-solid fa-calendar-check"></i> Leave Requests</a></li>
    <li><a href="Leave approval Page .html"><i class="fa-solid fa-check-circle"></i> Approvals</a></li>
    <li><a href="Recruitment.html"><i class="fa-solid fa-briefcase"></i> Recruitment</a></li>
    <li><a href="reports.html"><i class="fa-solid fa-file-lines"></i> Reports</a></li>
    <li class="active"><a href="Settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
    <li class="logout"><a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
  </ul>
</div>

<!-- Main -->
<div class="main">

  <div class="topbar">
    <h1>Settings</h1>
  </div>

  <div class="content">

    <div class="header">
      <h2>System Settings</h2>
    </div>

    <div class="settings-card">
      <h3>Account Information</h3>
      <div class="form-group">
        <label>Username</label>
        <input type="text" value="hr.manager" readonly>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" value="hr@qiwan.edu.iq" readonly>
      </div>
    </div>

    <div class="settings-card">
      <h3>Profile Settings</h3>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text">
      </div>
      <button>Save Changes</button>
    </div>

    <div class="settings-card">
      <h3>Security</h3>
      <div class="form-group">
        <label>Current Password</label>
        <input type="password">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password">
      </div>
      <button>Update Password</button>
    </div>

  </div>
</div>

</body>
</html>
