<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Summary | Employee Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {margin:0;font-family:Arial,Helvetica,sans-serif;background:#f2f2f2;color:#222;}
.top-header{background:#0e244c;height:46px;display:flex;align-items:center;padding:0 20px;color:#fff;font-size:14px;}
.wrapper{padding:25px;}
.page-title{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:bold;margin-bottom:19px;}
.icon-btn{background:none;border:none;color:#0e2859;font-size:20px;cursor:pointer;transition:color 0.2s ease;}
.icon-btn:hover{color:#153d8a;}
.content-card{background:#fff;border:1px solid #ddd;padding:20px;max-width:750px;}
h3{margin-top:0;color:#0e2859;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table th,.table td{border:1px solid #ddd;padding:8px;font-size:14px;}
.table th{background:#f7f7f7;text-align:left;}
</style>
</head>
<body>
<div class="top-header">Qaiwan International University</div>
<div class="wrapper">
  <div class="page-title">
    <button class="icon-btn" onclick="window.location.href='Employe Dashboard.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    Employee Summary
  </div>
  <div class="content-card">
    <h3>Employee Overview</h3>
    <table class="table">
      <tr><th>Field</th><th>Details</th></tr>
      <tr><td>Employee ID</td><td>QIU-EMP-001</td></tr>
      <tr><td>Name</td><td>Employee Name</td></tr>
      <tr><td>Department</td><td>Human Resources</td></tr>
      <tr><td>Position</td><td>HR Officer</td></tr>
      <tr><td>Email</td><td>employee@qiu.edu.iq</td></tr>
      <tr><td>Phone</td><td>+964 750 000 0000</td></tr>
    </table>
  </div>
</div>
</body>
</html>
