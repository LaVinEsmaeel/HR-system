<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leave Request | QIU</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Inter, sans-serif;
}

body {
  background: #f4f6f9;
  display: flex;
  height: 100vh;
  color: #1f2937;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 260px;
  background: #ffffff;
  border-right: 1px solid #e5e7eb;
  padding: 20px;
}

.logo {
  font-weight: 700;
  font-size: 14px;
  color: #0e244c;
  margin-bottom: 30px;
  line-height: 1.4;
}

.profile-box {
  background: #eef4ff;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 30px;
}

.profile-box img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  margin-bottom: 10px;
}

.profile-box h4 {
  font-size: 15px;
  font-weight: 600;
  color: #0e244c;
}

.profile-box span {
  font-size: 12px;
  color: #475569;
}

.menu li {
  list-style: none;
  padding: 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: #334155;
  margin-bottom: 6px;
}

.menu li.active,
.menu li:hover {
  background: #eef0ff;
  color: #0e244c;
}

.menu a {
  color: inherit;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}

/* ===== Main ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ===== Topbar ===== */
.topbar {
  background: #0e244c;
  padding: 15px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar h1 {
  color: white;
  font-size: 20px;
  font-weight: 600;
}

.back-btn {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: opacity 0.2s ease;
}

.back-btn:hover {
  opacity: 0.8;
}

/* ===== Content ===== */
.content {
  padding: 30px;
}

.header h2 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 25px;
}

/* ===== Card ===== */
.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  max-width: 700px;
}

/* ===== Info Box ===== */
.info {
  background: #eef4ff;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 25px;
  font-size: 14px;
  color: #0e244c;
}

/* ===== Form ===== */
.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 6px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  font-size: 14px;
}

textarea {
  resize: none;
  height: 90px;
}

/* ===== Button ===== */
.btn {
  background: #0e244c;
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.btn:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">QAIWAN INTERNATIONAL<br>UNIVERSITY</div>

  <div class="profile-box">
    <img src="sarah.png" alt="Employee Photo">
    <h4>Sarah Ali</h4>
    <span>Employee</span>
  </div>

  <ul class="menu">
    <li><a href="Employe Dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
    <li class="active"><a href="Leave Request Page.html"><i class="fa-solid fa-calendar-days"></i> Leave Request</a></li>
    <li><a href="Departments.html"><i class="fa-solid fa-building"></i> Department</a></li>
    <li><a href="reports.html"><i class="fa-solid fa-file-lines"></i> Reports</a></li>
    <li><a href="Settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
    <li style="margin-top:25px;"><a href="login.html" style="color:#dc2626"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
  </ul>
</div>

<div class="main">
  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='Employe Dashboard.html'">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <h1>Leave Request</h1>
  </div>

  <div class="content">
    <div class="header">
      <h2>Request Leave</h2>
    </div>

    <div class="card">
      <div class="info">
        Remaining Leave Balance: <strong>8 Days</strong>
      </div>

      <form>
        <div class="form-group">
          <label>Leave Type</label>
          <select>
            <option>Annual Leave</option>
            <option>Sick Leave</option>
            <option>Maternity Leave</option>
            <option>Emergency Leave</option>
          </select>
        </div>

        <div class="form-group">
          <label>Start Date</label>
          <input type="date">
        </div>

        <div class="form-group">
          <label>End Date</label>
          <input type="date">
        </div>

        <div class="form-group">
          <label>Reason</label>
          <textarea placeholder="Briefly explain the reason for leave..."></textarea>
        </div>

        <button class="btn">Submit Leave Request</button>
      </form>
    </div>
  </div>
</div>

</body>
</html>
