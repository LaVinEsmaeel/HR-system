<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Reset | QIU</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    margin: 0;
    height: 100vh;
    background-image: url("qiu.jpg"); /* same as login page */
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .bg-blur {
    position: fixed; 
    top: 0;
    left: 0;
    width:100%;
    height: 100%;
    background-image: url("qiu.jpg");
    background-size: cover;
    background-position: center;
    filter: blur(4px);
    opacity: 0.85;
    z-index: -1;
  }

  .reset-container {
    position: relative;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
    padding: 30px;
    width: 340px;
    text-align: center;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }

  h2 {
    font-family: 'Playfair Display', serif;
    color: #0e244c;
    margin-bottom: 10px;
  }

  p {
    color: #ffffffcc;
    font-size: 14px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #0e244c;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background: #1a5dc9;
  }

  .back-login {
    margin-top: 15px;
    font-size: 14px;
  }

  .back-login a {
    color: #6fa1e2;
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .back-login a:hover {
    color: #cedffa;
  }
</style>
</head>
<body>
  <div class="bg-blur"></div>

  <div class="reset-container">
    <h2>Reset Your Password</h2>
    <p>Enter your email address to get a reset link.</p>

    <input type="email" id="resetEmail" placeholder="Your Email">

    <button onclick="sendReset()">Send Reset Link</button>

    <p class="back-login">
      <a href="login.html">&larr; Back to Login</a>
    </p>
  </div>

  <script>
    function sendReset() {
      const email = document.getElementById("resetEmail").value;
      if (email === "") {
        alert("Please enter your email.");
      } else {
        alert("If this email is registered, a reset link will be sent.");
        // Backend API call would go here
      }
    }
  </script>
</body>
</html>
